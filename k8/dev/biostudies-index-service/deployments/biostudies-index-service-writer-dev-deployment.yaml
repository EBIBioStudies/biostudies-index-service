apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: indexer-writer
  namespace: biostudies-index-service-dev
spec:
  serviceName: indexer-writer
  replicas: 1
  selector:
    matchLabels:
      app: indexer
      role: writer
  template:
    metadata:
      labels:
        app: indexer
        role: writer
    spec:
#      imagePullSecrets:
#        - name: registry-credentials
      securityContext:
        runAsUser: $RUN_AS_USER    # 1741
        runAsGroup: $RUN_AS_GROUP  # 1030
        fsGroup: $RUN_AS_GROUP
      containers:
        - name: indexer
          image: biostudies/biostudies-index-service:dev
          readinessProbe:
            httpGet:
              path: /actuator/health  # $CONTEXT_PATH
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 60
          env:
            - name: INDEXER_ROLE
              value: writer
            - name: QUEUE_CONSUME
              value: "true"
            - name: INDEX_BASE_DIR
              value: /var/data/indexes
            - name: proxy_host
              value: "$PROXY_HOST"      # envsubst → hx-wwwcache.ebi.ac.uk
            - name: proxy_port
              value: "$PROXY_PORT"      # → 3128
            - name: http_proxy
              value: "http://$PROXY_HOST:$PROXY_PORT"
            - name: https_proxy
              value: "http://$PROXY_HOST:$PROXY_PORT"
            - name: HTTP_PROXY
              value: "http://$PROXY_HOST:$PROXY_PORT"
            - name: HTTPS_PROXY
              value: "http://$PROXY_HOST:$PROXY_PORT"
          ports:
            - containerPort: 8080
          volumeMounts:
#            - name: config-volume
#              mountPath: /app/application.properties
#              subPath: application.properties
            - name: shared-indexes
              mountPath: /nfs/indexes
              subPath: $SNAPSHOT_SUBPATH  # .adm/dev/indexes
              readOnly: true
            - name: index-storage
              mountPath: /var/data/indexes
        - name: snapshot-sidecar  # Rsync local → NFS snapshot
          image: alpine:3.19
          securityContext:
            runAsUser: 0
          command: ["/bin/sh"]
          args:
            - -c
            - |
              apk add --no-cache rsync;
              while true; do
                rsync -avz --delete /var/data/indexes/ /nfs/indexes/;
                sleep 300;
              done
          volumeMounts:
            - name: index-storage
              mountPath: /var/data/indexes
            - name: shared-indexes
              mountPath: /nfs/indexes
      volumes:
#        - name: config-volume
#          configMap:
#            name: external-config
        - name: shared-indexes
          nfs:
            server: $NFS_SERVER  # vnas-biostudies-vlan0157.ebi.ac.uk
            path: $NFS_PATH      # /fg_biostudies
  volumeClaimTemplates:
    - metadata:
        name: index-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-storage
        resources:
          requests:
            storage: 100Gi