apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: indexer-writer
  namespace: biostudies-index-service-dev
spec:
  serviceName: indexer-writer
  replicas: 1
  selector:
    matchLabels:
      app: indexer
      role: writer
  template:
    metadata:
      labels:
        app: indexer
        role: writer
    spec:
      securityContext:
        runAsUser: 1741
        runAsGroup: 1030
      containers:
        - name: indexer
          image: biostudies/biostudies-index-service:dev
          env:
            - name: INDEXER_ROLE
              value: writer
            - name: QUEUE_CONSUME
              value: "true"
            - name: INDEX_BASE_DIR
              value: /var/data/indexes
            - name: HTTP_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: HTTPS_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: http_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: https_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.cluster.local,.svc"
            - name: no_proxy
              value: "localhost,127.0.0.1,.cluster.local,.svc"
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djdk.httpclient.allowHTTP2=false
                -Djdk.httpclient.keepalive.timeout=0
                -Djdk.httpclient.HttpClient.log=all
                -Dhttp.proxyHost=hx-wwwcache.ebi.ac.uk
                -Dhttp.proxyPort=3128
                -Dhttps.proxyHost=hx-wwwcache.ebi.ac.uk
                -Dhttps.proxyPort=3128
                -Dhttp.nonProxyHosts=localhost|127.0.0.1|*.cluster.local|*.svc|hx-wwwcache.ebi.ac.uk
          volumeMounts:
            - name: index-storage
              mountPath: /var/data/indexes
            - name: efo-volume
              mountPath: /app/data
        - name: efo-sidecar
          image: alpine:3.19
          securityContext:
            runAsUser: 0
          env:
            - name: HTTP_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: HTTPS_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: http_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: https_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.cluster.local,.svc"
            - name: no_proxy
              value: "localhost,127.0.0.1,.cluster.local,.svc"
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -e
              apk add --no-cache wget
              if [ ! -f /app/data/efo.owl ]; then
                echo "efo.owl not found, downloading..."
                wget -O /app/data/efo.owl "https://www.ebi.ac.uk/efo/efo.owl"
              else
                echo "efo.owl already present, skipping download"
              fi
              tail -f /dev/null
          volumeMounts:
            - name: efo-volume
              mountPath: /app/data
        - name: snapshot-sidecar
          image: alpine:3.19
          securityContext:
            runAsUser: 0
          command: ["/bin/sh"]
          args:
            - -c
            - |
              echo "snapshot-sidecar: rsync disabled for now; doing nothing"
              tail -f /dev/null
          volumeMounts:
            - name: index-storage
              mountPath: /var/data/indexes
      volumes:
        - name: efo-volume
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: index-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-storage
        resources:
          requests:
            storage: 100Gi
