apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: indexer-writer
  namespace: biostudies-index-service-dev
spec:
  serviceName: indexer-writer
  replicas: 1
  selector:
    matchLabels:
      app: indexer
      role: writer
  template:
    metadata:
      labels:
        app: indexer
        role: writer
    spec:
      securityContext:
        runAsUser: 1741
        runAsGroup: 1030
      initContainers:
        - name: efo-init
          image: alpine:3.19
          securityContext:
            runAsUser: 0
          env:
            - name: HTTP_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: HTTPS_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: http_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: https_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.cluster.local,.svc"
            - name: no_proxy
              value: "localhost,127.0.0.1,.cluster.local,.svc"
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -e
              apk add --no-cache wget
              if [ ! -f /app/data/efo.owl ]; then
                echo "efo.owl not found, downloading..."
                wget -O /app/data/efo.owl "https://www.ebi.ac.uk/efo/efo.owl"
                echo "efo.owl download complete"
              else
                echo "efo.owl already present, skipping download"
              fi
          volumeMounts:
            - name: efo-volume
              mountPath: /app/data

      containers:
        - name: indexer
          image: biostudies/biostudies-index-service:dev
          imagePullPolicy: Always
          env:
            - name: INDEXER_ROLE
              value: writer
            - name: QUEUE_CONSUME
              value: "true"
            - name: INDEX_BASE_DIR
              value: /var/data/indexes
            - name: HTTP_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: HTTPS_PROXY
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: http_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: https_proxy
              value: "http://hx-wwwcache.ebi.ac.uk:3128"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.cluster.local,.svc,biostudies-beta"
            - name: no_proxy
              value: "localhost,127.0.0.1,.cluster.local,.svc,biostudies-beta"
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djdk.httpclient.allowHTTP2=false
                -Djdk.httpclient.keepalive.timeout=0
                -Djdk.httpclient.HttpClient.log=all
                -Dhttp.proxyHost=hx-wwwcache.ebi.ac.uk
                -Dhttp.proxyPort=3128
                -Dhttps.proxyHost=hx-wwwcache.ebi.ac.uk
                -Dhttps.proxyPort=3128
                -Dhttp.nonProxyHosts=localhost|127.0.0.1|*.cluster.local|*.svc|hx-wwwcache.ebi.ac.uk
          volumeMounts:
            - name: index-storage
              mountPath: /var/data/indexes
            - name: efo-volume
              mountPath: /app/data
            - name: security-config
              mountPath: /app/config
              readOnly: true

        - name: snapshot-sidecar
          image: biostudies/rsync-sidecar:alpine-3.19
          securityContext:
            runAsUser: 1741
            runAsGroup: 1030
          env:
            - name: SNAPSHOT_INTERVAL_SECONDS
              value: "60"
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -e
              interval="${SNAPSHOT_INTERVAL_SECONDS:-60}"
              base="${SNAPSHOT_BASE:-/nfs/indexes}"
              target="$base/current"

              mkdir -p "$base"
              echo "snapshot-sidecar: starting rsync loop to $target"

              while true; do
                tmp="$base/.current-tmp"
                rm -rf "$tmp" 2>/dev/null || true

                mkdir -p "$tmp"
                echo "snapshot-sidecar: incremental rsync (ignore NFS locks)"

                # Ignore NFS lockfiles, incremental sync
                rsync -a \
                      --delete-excluded \
                      --filter='protect .nfs*' \
                      --filter='- /*' \
                      /var/data/indexes/ "$tmp"/

                echo "snapshot-sidecar: switch $tmp → $target"
                mv "$tmp" "$target" 2>/dev/null || {
                  echo "snapshot-sidecar: mv busy, rsync direct to target"
                  rsync -a \
                        --delete-excluded \
                        --filter='protect .nfs*' \
                        --filter='- /*' \
                        /var/data/indexes/ "$target"/
                }

                echo "snapshot-sidecar: sync complete, sleep $interval"
                sleep "$interval"
              done

          volumeMounts:
            - name: index-storage
              mountPath: /var/data/indexes
              readOnly: true
            - name: shared-indexes
              mountPath: /nfs/indexes

      volumes:
        - name: efo-volume
          emptyDir: {}
        - name: shared-indexes
          persistentVolumeClaim:
            claimName: shared-indexes-pvc
        - name: security-config
          secret:
            secretName: indexer-security-config

  volumeClaimTemplates:
    - metadata:
        name: index-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-storage
        resources:
          requests:
            storage: 100Gi