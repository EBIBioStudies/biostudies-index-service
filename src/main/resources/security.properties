# =============================================================================
# BioStudies Index Service Security Configuration
# =============================================================================
# Base URL to call backend endpoints
backend.baseUrl=

# Authentication Service URLs
# These URLs connect to the central authentication service for user profile and login operations
auth.profileUrl=
auth.loginUrl=

# Index Administration Access Control
# Comma-separated list of allowed IP addresses/hosts for admin operations
index.admin.ip.allow.list=

# HTTP Proxy Configuration (optional)
# Leave empty if no proxy is required
# Format: host:port or just host if port is specified separately
http.proxy.host=
http.proxy.port=

# REST API Partial Update Security Token
# Token required for partial document update operations via REST endpoints
partial.update.rest.token=

# STOMP/WebSocket Messaging Configuration
# Headers and connection details for STOMP over WebSocket (RabbitMQ integration)
# Currently unused as spring.rabbitmq.stomp.enable=false
rabbitmq.stomp.loginHeader=
rabbitmq.stomp.passwordHeader=
rabbitmq.stomp.host=
rabbitmq.stomp.port=

