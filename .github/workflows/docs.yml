name: Deploy Docs
on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', 'mkdocs.yml', '*.md' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs mkdocs-material "mkdocs<2"
      - run: mkdocs gh-deploy --force