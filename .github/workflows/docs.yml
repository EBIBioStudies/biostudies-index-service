name: Deploy Docs

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', 'mkdocs.yml', '*.md' ]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material "mkdocs<2"
          # Add if requirements.txt: pip install -r docs/requirements.txt
      - name: Deploy
        uses: mhausenblas/mkdocs-deploy-gh-pages@v4.4.1  # Simple deploy
